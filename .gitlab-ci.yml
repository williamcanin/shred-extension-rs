stages:
  - build
  - release

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${CI_COMMIT_TAG}"

# --- JOB: Build Linux ---
build-linux:
  stage: build
  image: rust:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - "apt-get update && apt-get install -y jq wget xz-utils file pkg-config libglib2.0-dev libnautilus-extension-dev libthunarx-3-dev"
    - "VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
    - "mkdir -p dist"
    - "cargo build --release --features nautilus"
    - "cp target/release/libshred_extension_rs.so dist/libshred-extension-rs-nautilus-${VERSION}-x86_64.so"
    - "cargo build --release --features thunar"
    - "cp target/release/libshred_extension_rs.so dist/libshred-extension-rs-thunar-${VERSION}-x86_64.so"
    - "echo $VERSION > dist/version.txt"
  artifacts:
    paths:
      - dist/

# --- JOB: Release ---
release-creation:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs: ["build-linux"]
  before_script:
    - apk add --no-cache gnupg curl bash
  script:
    - VERSION=$(cat dist/version.txt)
    - cd dist

    # Upload dos dois .so
    - "curl --header \"JOB-TOKEN: $CI_JOB_TOKEN\" --upload-file libshred-extension-rs-nautilus-${VERSION}-x86_64.so \"${PACKAGE_REGISTRY_URL}/libshred-extension-rs-nautilus-${VERSION}-x86_64.so\""
    - "curl --header \"JOB-TOKEN: $CI_JOB_TOKEN\" --upload-file libshred-extension-rs-thunar-${VERSION}-x86_64.so \"${PACKAGE_REGISTRY_URL}/libshred-extension-rs-thunar-${VERSION}-x86_64.so\""

    # SHA256SUMS apenas
    - "sha256sum libshred-extension-rs-*-${VERSION}-x86_64.so > SHA256SUMS"
    - "curl --header \"JOB-TOKEN: $CI_JOB_TOKEN\" --upload-file SHA256SUMS \"${PACKAGE_REGISTRY_URL}/SHA256SUMS\""
  release:
    name: "Version $CI_COMMIT_TAG"
    description: |
      Automatic release for version $CI_COMMIT_TAG

      🔐 Files included:
      - libshred-extension-rs-nautilus — extensão para Nautilus
      - libshred-extension-rs-thunar  — extensão para Thunar
      - SHA256SUMS — checksums
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "Nautilus Extension"
          url: "${PACKAGE_REGISTRY_URL}/libshred-extension-rs-nautilus-${CI_COMMIT_TAG#v}-x86_64.so"
        - name: "Thunar Extension"
          url: "${PACKAGE_REGISTRY_URL}/libshred-extension-rs-thunar-${CI_COMMIT_TAG#v}-x86_64.so"
        - name: "SHA256 Checksums"
          url: "${PACKAGE_REGISTRY_URL}/SHA256SUMS"
